<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>우리 가족 스마트 시간표 V4.3</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        :root { --p-color: #74B9FF; --bg: #F8F9FA; --brd: #E9ECEF; --txt: #2D3436; --header-h: 50px; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Pretendard', sans-serif; }
        body, html { height: 100%; margin: 0; background: var(--bg); color: var(--txt); overflow: hidden; display: flex; flex-direction: column; }
        
        .top-nav { height: var(--header-h); background: #fff; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; border-bottom: 1px solid var(--brd); z-index: 1000; }
        .nav-btn { background: #F1F3F5; border: none; padding: 8px 12px; border-radius: 8px; font-size: 13px; font-weight: 700; cursor: pointer; }
        .nav-btn.primary { background: var(--p-color); color: white; }

        .input-panel { background: #fff; padding: 10px; border-bottom: 1px solid var(--brd); flex-shrink: 0; }
        .input-group { display: flex; gap: 4px; margin-bottom: 8px; }
        .inp-name { flex: 1.2; min-width: 0; padding: 10px; border: 2px solid #DEE2E6; border-radius: 8px; font-size: 13px; outline: none; }
        .inp-time { flex: 1; min-width: 0; padding: 10px 5px; border: 2px solid #DEE2E6; border-radius: 8px; font-size: 13px; outline: none; text-align: center; }
        
        .day-selector { display: flex; gap: 3px; }
        .day-check { flex: 1; padding: 10px 0; background: #F8F9FA; border-radius: 8px; font-size: 11px; text-align: center; border: 1px solid #EDF2F7; font-weight: 600; cursor: pointer; }
        .day-check input { display: none; }
        .day-check:has(input:checked) { background: #A29BFE; color: white; border-color: #A29BFE; }

        /* [핵심 수정] 시간표 좌우 여백 5% 적용 */
        .timetable-container { flex: 1; overflow-y: auto; position: relative; background: #fff; padding: 0 5%; }
        .timetable { width: 100%; border-collapse: collapse; table-layout: fixed; }
        .timetable th { background: #F1F3F5; font-size: 11px; height: 35px; border: 1px solid var(--brd); position: sticky; top: 0; z-index: 50; }
        .time-col { width: 42px; font-size: 10px; color: #ADB5BD; text-align: center; border: 1px solid var(--brd); }
        .timetable td { height: 45px; border: 1px solid var(--brd); }

        /* 블록 레이어 위치를 컨테이너 여백에 맞춤 */
        #blockLayer { position: absolute; top: 0; left: 5%; right: 5%; height: 100%; pointer-events: none; z-index: 25; }
        .class-block { 
            position: absolute; pointer-events: auto;
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            padding: 2px; font-weight: 800; font-size: 10px; text-align: center; 
            box-shadow: inset 0 0 0 1px rgba(0,0,0,0.05); border: 1px solid rgba(255,255,255,0.4); 
            line-height: 1.1; overflow: hidden;
        }

        #nowLine { position: absolute; height: 2px; background: #FF7675; z-index: 60; pointer-events: none; transition: all 0.3s ease; }
        #nowLine::before { content: ''; position: absolute; left: -3px; top: -3px; width: 8px; height: 8px; background: #FF7675; border-radius: 50%; }

        .export-area { padding: 10px; display: flex; gap: 8px; background: #fff; border-top: 1px solid var(--brd); }
        .export-btn { flex: 1; padding: 12px; border-radius: 8px; border: 1px solid #DEE2E6; background: #fff; font-size: 12px; font-weight: 800; }

        #memberModal { display: none; position: fixed; top: 0; left: 0; width: 260px; background: white; height: 100%; z-index: 2000; padding: 25px; box-shadow: 10px 0 20px rgba(0,0,0,0.1); }
        .member-item { display: flex; justify-content: space-between; align-items: center; background: #F1F3F5; margin-bottom: 10px; padding: 12px; border-radius: 10px; font-weight: 600; cursor: pointer; }
    </style>
</head>
<body>

    <nav class="top-nav">
        <button class="nav-btn" onclick="toggleMenu(true)">👨‍👩‍👧‍👦 가족</button>
        <div id="viewStatus" style="font-weight: 800; color: #0984E3; font-size: 14px;">전체보기</div>
        <button class="nav-btn primary" onclick="addSchedule()">저장</button>
    </nav>

    <div class="input-panel">
        <div class="input-group">
            <input type="text" id="classNameInp" class="inp-name" list="defaultSchedules" placeholder="일정명">
            <datalist id="defaultSchedules">
                <option value="학교"> <option value="수영"> <option value="구몬"> <option value="피아노"> <option value="축구">
            </datalist>
            <input type="text" id="startTime" class="inp-time" placeholder="시작" maxlength="4">
            <input type="text" id="endTime" class="inp-time" placeholder="종료" maxlength="4">
        </div>
        <div id="daySelector" class="day-selector"></div>
    </div>

    <div class="timetable-container" id="captureArea">
        <table class="timetable" id="baseTable">
            <thead><tr id="dayHeaders"></tr></thead>
            <tbody id="timetableBody"></tbody>
        </table>
        <div id="blockLayer"><div id="nowLine"></div></div>
    </div>

    <div class="export-area">
        <button class="export-btn" onclick="exportExcel()">📊 Excel</button>
        <button class="export-btn" onclick="exportPDF()">📄 PDF</button>
    </div>

    <div id="overlay" onclick="toggleMenu(false)" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.4); z-index:1500;"></div>
    <div id="memberModal">
        <h2 style="font-size:18px;">가족 목록</h2>
        <div id="memberList"></div>
        <button onclick="addMember()" style="width:100%; padding:12px; margin-top:10px; border-radius:10px;">+ 추가</button>
    </div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyD8Lu75Q9T4Uu0OA_2fXpKLh3t6z04H6yg",
        authDomain: "family-scheduler-f61ee.firebaseapp.com",
        databaseURL: "https://family-scheduler-f61ee-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "family-scheduler-f61ee",
        storageBucket: "family-scheduler-f61ee.firebasestorage.app",
        messagingSenderId: "123040053288",
        appId: "1:123040053288:web:1960a257bc27af1aa15d1d"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const dayNames = ['월', '화', '수', '목', '금', '토', '일'];
    const colorPalette = ['#D1BAFF', '#B2E2F2', '#FFBEBC', '#FFF5BA', '#ABF7B1', '#E2F0CB', '#FFCCF9', '#C7CEEA'];
    let colorMap = {}, schedule = {}, familyMembers = ['아빠', '엄마', '하윤', '우빈'], currentFilter = "전체";

    const init = () => {
        document.getElementById('dayHeaders').innerHTML = '<th class="time-col">시간</th>' + dayNames.map(d => `<th>${d}</th>`).join('');
        document.getElementById('daySelector').innerHTML = dayNames.map(d => `<label class="day-check"><input type="checkbox" value="${d}"> ${d}</label>`).join('');
        let html = '';
        for(let h=6; h<=22; h++) html += `<tr><td class="time-col">${h}:00</td>${'<td></td>'.repeat(7)}</tr>`;
        document.getElementById('timetableBody').innerHTML = html;
        
        setInterval(updateNowLine, 30000);
        updateNowLine();
    };

    const updateNowLine = () => {
        const now = new Date();
        const hour = now.getHours(), min = now.getMinutes();
        const line = document.getElementById('nowLine');
        const currentDayIdx = (now.getDay() + 6) % 7;

        if(hour < 6 || hour > 22) { line.style.display = 'none'; return; }
        
        const table = document.getElementById('baseTable');
        const headH = table.querySelector('thead').offsetHeight;
        const rowH = table.querySelector('td').offsetHeight;
        const colW = (table.offsetWidth - 42) / 7;

        line.style.display = 'block';
        line.style.top = (headH + ((hour - 6) * rowH) + (min / 60 * rowH)) + 'px';
        line.style.left = (42 + currentDayIdx * colW) + 'px';
        line.style.width = colW + 'px';
        
        render(); 
    };

    const render = () => {
        const layer = document.getElementById('blockLayer');
        const nowLine = document.getElementById('nowLine');
        layer.innerHTML = ''; layer.appendChild(nowLine);
        
        const table = document.getElementById('baseTable');
        const headH = table.querySelector('thead').offsetHeight, rowH = table.querySelector('td').offsetHeight;
        const colW = (table.offsetWidth - 42) / 7;
        
        const now = new Date();
        const currentDayIdx = (now.getDay() + 6) % 7;
        const currentTotalMin = now.getHours() * 60 + now.getMinutes();

        dayNames.forEach((day, dIdx) => {
            (schedule[day] || []).forEach((item, i) => {
                if(currentFilter !== "전체" && item.owner !== currentFilter) return;
                if(!colorMap[item.name]) colorMap[item.name] = colorPalette[Object.keys(colorMap).length % colorPalette.length];
                
                const parse = t => t.split(':').reduce((h, m) => h*60 + (+m), 0);
                const startMin = parse(item.start), endMin = parse(item.end);
                const s = startMin - (6*60), dur = endMin - startMin;

                const block = document.createElement('div');
                block.className = 'class-block';
                block.style.cssText = `top:${headH + (s/60)*rowH}px; height:${(dur/60)*rowH}px; left:${42 + dIdx*colW}px; width:${colW}px; background:${colorMap[item.name]};`;
                
                if(dIdx !== currentDayIdx) block.style.opacity = "0.2";
                else if (endMin < currentTotalMin) block.style.opacity = "0.5";

                block.innerHTML = `<div style="font-size:8px; opacity:0.8">${item.owner}</div><div style="white-space:nowrap">${item.name}</div>`;
                block.onclick = () => confirm('삭제하시겠습니까?') && (schedule[day].splice(i, 1), save());
                layer.appendChild(block);
            });
        });
    };

    const addSchedule = () => {
        const name = document.getElementById('classNameInp').value;
        const sV = document.getElementById('startTime').value, eV = document.getElementById('endTime').value;
        const days = [...document.querySelectorAll('.day-check input:checked')].map(i => i.value);
        if(!name || sV.length<4 || eV.length<4 || !days.length) return alert("정보를 모두 입력해주세요.");
        
        days.forEach(d => {
            if(!schedule[d]) schedule[d] = [];
            schedule[d].push({ name, start: `${sV.slice(0,2)}:${sV.slice(2,4)}`, end: `${eV.slice(0,2)}:${eV.slice(2,4)}`, owner: currentFilter });
        });
        save();
        document.getElementById('classNameInp').value = ''; document.getElementById('startTime').value = ''; document.getElementById('endTime').value = '';
    };

    const toggleMenu = (s) => { 
        document.getElementById('memberModal').style.display = s?'block':'none'; 
        document.getElementById('overlay').style.display = s?'block':'none';
        if(s) renderMembers();
    };

    const renderMembers = () => {
        let h = `<div class="member-item" onclick="setFilter('전체')">전체보기</div>`;
        familyMembers.forEach((m, i) => {
            h += `<div class="member-item">
                    <span onclick="setFilter('${m}')" style="flex:1">${m}</span>
                    <button onclick="deleteMember(${i})" style="border:none; color:red; background:none;">삭제</button>
                  </div>`;
        });
        document.getElementById('memberList').innerHTML = h;
    };

    const deleteMember = (i) => { if(confirm(`${familyMembers[i]}님을 삭제할까요?`)) { familyMembers.splice(i, 1); save(); } };
    const setFilter = (n) => { currentFilter = n; document.getElementById('viewStatus').innerText = n; toggleMenu(false); render(); };
    const addMember = () => { const n = prompt("이름:"); if(n) { familyMembers.push(n); save(); } };
    const save = () => db.ref('family_data').set({ schedule, familyMembers });
    db.ref('family_data').on('value', snap => { if(snap.val()) { schedule = snap.val().schedule || {}; familyMembers = snap.val().familyMembers || familyMembers; render(); } });

    const exportExcel = () => {
        const header = ["시간", ...dayNames];
        const rows = [];
        for(let h=6; h<=22; h++) {
            const row = [`${h}:00`];
            dayNames.forEach(day => {
                const items = (schedule[day] || []).filter(it => it.start.startsWith(h.toString().padStart(2, '0')));
                row.push(items.map(it => `[${it.owner}] ${it.name}`).join('\n'));
            });
            rows.push(row);
        }
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet([header, ...rows]), "시간표");
        XLSX.writeFile(wb, `가족시간표_${currentFilter}.xlsx`);
    };

    const exportPDF = () => {
        const element = document.getElementById('captureArea');
        html2pdf().set({
            margin: 5, filename: `가족시간표_${currentFilter}.pdf`,
            html2canvas: { scale: 3, useCORS: true },
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'landscape' }
        }).from(element).save();
    };

    init();
</script>
</body>
</html>
