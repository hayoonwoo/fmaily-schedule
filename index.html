<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>가족 실시간 스케줄러</title>
    <style>
        /* 1. 기본 스타일 및 오프셋 설정 */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100vw;
            height: 100vh;
            background-color: #f0f2f5;
            font-family: 'Pretendard', -apple-system, sans-serif;
            overflow: hidden; /* 바깥 스크롤 방지 */
        }

        /* 메인 컨테이너: 상하좌우 10% 여백 (너비 80%, 높이 80%) */
        .app-container {
            width: 80vw;
            height: 80vh;
            background: white;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* 2. 세로 모드 (Portrait) 대응 */
        @media (orientation: portrait) {
            .app-container {
                width: 90vw;  /* 세로는 폭이 좁으므로 여백을 5%로 살짝 조정해 가독성 확보 */
                height: 85vh;
            }
            .content-area {
                flex-direction: column;
            }
        }

        /* 3. 가로 모드 (Landscape) 대응 */
        @media (orientation: landscape) {
            .app-container {
                width: 80vw;
                height: 80vh;
            }
            .content-area {
                flex-direction: row; /* 가로일 땐 달력과 일정을 좌우로 배치 가능 */
            }
        }

        /* 내부 구성 요소 스타일 */
        .header {
            padding: 20px;
            background: #fff;
            border-bottom: 1px solid #eee;
            text-align: center;
            font-weight: bold;
        }

        .content-area {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        .calendar-section {
            flex: 1.5;
            padding: 15px;
            overflow-y: auto;
        }

        .schedule-section {
            flex: 1;
            padding: 15px;
            background: #fafafa;
            border-left: 1px solid #eee;
            overflow-y: auto;
        }

        /* 모바일 세로 모드일 때 섹션 구분 */
        @media (orientation: portrait) {
            .schedule-section {
                border-left: none;
                border-top: 1px solid #eee;
            }
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="header">
            우리 가족 스케줄러 (V2.0)
        </div>
        
        <div class="content-area">
            <div class="calendar-section">
                <div id="calendar">달력 로드 중...</div>
            </div>

            <div class="schedule-section">
                <div id="event-list">오늘의 일정</div>
            </div>
        </div>
    </div>

    <script>
        // 4. 화면 회전 시 부드러운 처리를 위한 이벤트 리스너 (선택 사항)
        window.addEventListener('orientationchange', function() {
            // 회전 시 레이아웃 재계산이 필요한 로직이 있다면 여기에 추가
            console.log("화면 방향 변경됨");
        });

        // 기존에 제미나이와 작성했던 Firebase 데이터 바인딩 코드를 여기에 삽입하세요.
    </script>
</body>
</html>
